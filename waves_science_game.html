<!DOCTYPE html>\n<html lang="ar">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>لعبة waves العلمية</title>\n    <style>\n        body { background: url('animated_background.gif') no-repeat center center fixed; animation: backgroundAnimation 10s infinite; }\n        @keyframes backgroundAnimation { 0% { background-position: 0 0; } 100% { background-position: 100% 0; } }\n        .correct { color: green; }\n        .wrong { color: red; }\n        #timer { font-size: 20px; }\n    </style>\n</head>\n<body>\n    <h1>اختبر معرفتك عن الأمواج</h1>\n    <div id="question"></div>\n    <div id="options"></div>\n    <div id="feedback"></div>\n    <div id="timer"></div>\n    <audio id="correct-sound" src="correct_answer.mp3"></audio>\n    <audio id="wrong-sound" src="wrong_answer.mp3"></audio>\n    <script>\n        const questions = [\n            { question: 'ما هي الموجات الصوتية؟', answers: ['موجات مرئية', 'موجات سمعية', 'موجات ضوئية'], correct: 1 },\n            { question: 'ماذا يستخدم لقياس طول الموجة؟', answers: ['السماعة', 'محول الطاقة', 'المسطرة'], correct: 2 },\n            // Add more questions here\n        ];\n        let currentQuestionIndex = 0;\n        let timer;\n        function startTimer() {\n            let timeLeft = 30;\n            document.getElementById('timer').innerText = `الوقت المتبقي: ${timeLeft}`;\n            timer = setInterval(() => {\n                timeLeft--;\n                document.getElementById('timer').innerText = `الوقت المتبقي: ${timeLeft}`;\n                if (timeLeft <= 0) {\n                    clearInterval(timer);\n                    showFeedback(false);\n                }\n            }, 1000);\n        }\n        function showFeedback(isCorrect) {\n            clearInterval(timer);\n            const feedback = document.getElementById('feedback');\n            feedback.innerText = isCorrect ? 'إجابة صحيحة!' : 'إجابة خاطئة!';\n            feedback.className = isCorrect ? 'correct' : 'wrong';\n            const sound = document.getElementById(isCorrect ? 'correct-sound' : 'wrong-sound');\n            sound.play();\n        }\n        function loadQuestion() {\n            const currentQuestion = questions[currentQuestionIndex];\n            document.getElementById('question').innerText = currentQuestion.question;\n            const optionsContainer = document.getElementById('options');\n            optionsContainer.innerHTML = '';\n            currentQuestion.answers.forEach((answer, index) => {\n                const button = document.createElement('button');\n                button.innerText = answer;\n                button.onclick = () => {\n                    const isCorrect = index === currentQuestion.correct;\n                    showFeedback(isCorrect);\n                };\n                optionsContainer.appendChild(button);\n            });\n            startTimer();\n        }\n        loadQuestion();\n    </script>\n</body>\n</html>
