<!DOCTYPE html>\n<html lang="ar">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>لعبة التعليم عن الأمواج</title>\n    <style>\n        body { font-family: Arial, sans-serif; background: url('background.jpg') no-repeat center center fixed; background-size: cover; }\n        .container { max-width: 800px; margin: auto; color: #fff; text-align: center; }\n        .question { font-size: 24px; margin: 20px 0; }\n        .answers { margin: 10px 0; }\n        .button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }\n        .correct { background-color: green; }\n        .wrong { background-color: red; }\n        .hidden { display: none; }\n    </style>\n    <script>\n        let currentQuestion = 0;\n        let score = 0;\n        const questions = [\n            { q: 'ما هي الموجة؟', a: ['تحرك الطاقة', 'تحرك المادة', 'كلاهما'], correct: 0 },\n            { q: 'ما هو تردد الموجة؟', a: ['عدد التذبذبات في الثانية', 'المسافة بين القمم', 'مدة الموجة'], correct: 0 },\n            { q: 'ما هو الطول الموجي؟', a: ['المسافة بين ��لقمم', 'عدد الموجات', 'طاقة الموجة'], correct: 0 },\n            { q: 'ما هو نوع الموجات الذي يحتاج إلى وسط؟', a: ['الموجات الطولية', 'الموجات المستعرضة', 'كلاهما'], correct: 0 },\n            { q: 'ما هي سرعة الموجة؟', a: ['المسافة/الزمن', 'الارتفاع/الزمن', 'التردد/الزمن'], correct: 0 },\n            // Add more questions as needed\n        ];\n        function loadQuestion() {\n            document.getElementById('question').innerText = questions[currentQuestion].q;\n            const answersContainer = document.getElementById('answers');\n            answersContainer.innerHTML = '';\n            questions[currentQuestion].a.forEach((answer, index) => {\n                let button = document.createElement('button');\n                button.className = 'button';\n                button.innerText = answer;\n                button.onclick = () => checkAnswer(index);\n                answersContainer.appendChild(button);\n            });\n        }\n        function checkAnswer(selected) {\n            if (selected === questions[currentQuestion].correct) {\n                score++;\n                // Play correct sound\n                alert('إجابة صحيحة!');\n            } else {\n                // Play wrong sound\n                alert('إجابة خاطئة');\n            }\n            currentQuestion++;\n            if (currentQuestion < questions.length) {\n                loadQuestion();\n            } else {\n                showResults();\n            }\n        }\n        function showResults() {\n            const percentage = (score / questions.length) * 100;\n            document.body.innerHTML = `<div class='container'><h1>النتائج النهائية</h1><p>نقاطك: ${score}/${questions.length} (${percentage.toFixed(2)}%)</p>` +\n                (percentage >= 60 ? "<p>عمل رائع! تابع على هذا النحو!</p>" : "<p>لا تيأس! حاول مرة أخرى.</p>");\n        }\n        window.onload = loadQuestion;\n    </script>\n</head>\n<body>\n    <div class='container'>\n        <h1>لعبة التعليم عن الأمواج</h1>\n        <div class='question' id='question'></div>\n        <div class='answers' id='answers'></div>\n    </div>\n</body>\n</html>\n
